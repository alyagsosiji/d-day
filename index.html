<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수평선 너머의 디데이</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="stars-container"></div>

    <div class="main-container">
        <h1 class="title">수평선 너머의 디데이</h1>
        <p class="subtitle">Beyond the horizon, where our time meets.</p>
        
        <div class="player-wrapper">
            <div class="cd-capsule" id="cd-player">
                <div class="cd-disk">
                    <div class="cd-inner-ring">
                        <div class="cd-center-hole"></div>
                    </div>
                </div>
            </div>
            <p class="player-tip">TAP TO PLAY OUR SONG</p>
            <audio id="bgm" src="music.mp3" loop></audio>
        </div>

        <div class="countdown-wrapper">
            <div class="time-box">
                <span id="days" class="time-num">00</span>
                <span class="time-label">DAYS</span>
            </div>
            <div class="time-box">
                <span id="hours" class="time-num">00</span>
                <span class="time-label">HOURS</span>
            </div>
            <div class="time-box">
                <span id="minutes" class="time-num">00</span>
                <span class="time-label">MINS</span>
            </div>
            <div class="time-box">
                <span id="seconds" class="time-num">00</span>
                <span class="time-label">SECS</span>
            </div>
            <div class="time-box ms-box">
                <span id="milliseconds" class="time-num">00</span>
                <span class="time-label">MS</span>
            </div>
        </div>

        <div class="heart-icon">♥</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
