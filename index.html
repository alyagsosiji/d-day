<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수평선 너머의 디데이</title>
    <link rel="icon" href="디데이_하은.jpg" type="image/jpg">
    <link rel="shortcut icon" href="교톡_하은.jpg" type="image/jpeg">
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#061630">

    <link rel="apple-touch-icon" href="디데이_하은.jpg">
    <link rel="apple-touch-icon" sizes="152x152" href="디데이_하은.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="디데이_하은.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="수평선 너머의 디데이">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;500&display=swap" rel="stylesheet">
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
    
    <div id="loading-screen">
        <div class="loader-content">
            <div class="loader-circle"></div>
            <p class="loader-text">수평선을 그리는 중...</p>
        </div>
    </div>

    <div id="stars-container"></div>

    <div class="main-container">
        <div class="control-panel">
            <button id="eco-toggle" class="control-btn" title="화면 최적화 모드">
                <span>✨</span> <span id="eco-text">최적화 Mode</span>
            </button>
            <button id="mode-toggle" class="control-btn" title="타이머 모드 전환">
                <span id="mode-icon">⏳</span> <span id="mode-text">남은 시간 보기</span>
            </button>
        </div>

        <h1 class="title" id="main-title">수평선 너머의 디데이</h1>
        <p class="subtitle" id="main-subtitle">Beyond the horizon, where our time meets.</p>
        
        <div class="player-wrapper">
            <div class="cd-capsule" id="cd-player">
                <div class="cd-disk">
                    <div class="cd-inner-ring">
                        <div class="cd-center-hole"></div>
                    </div>
                </div>
            </div>
            <p class="player-tip">TAP TO PLAY OUR SONG</p>
            <audio id="bgm" src="Night_Sky_City_2026_Plum.mp3" loop></audio>
        </div>

        <div class="countdown-wrapper">
            <div class="time-box">
                <span id="days" class="time-num">00</span>
                <span class="time-label">DAYS</span>
            </div>
            <div class="time-box">
                <span id="hours" class="time-num">00</span>
                <span class="time-label">HOURS</span>
            </div>
            <div class="time-box">
                <span id="minutes" class="time-num">00</span>
                <span class="time-label">MINS</span>
            </div>
            <div class="time-box">
                <span id="seconds" class="time-num">00</span>
                <span class="time-label">SECS</span>
            </div>
            <div class="time-box ms-box">
                <span id="milliseconds" class="time-num">00</span>
                <span class="time-label">MS</span>
            </div>
        </div>

        <div class="heart-icon">♥</div>
    </div>
    <footer class="site-footer">
        배경음악 - Night Sky City 2026 - Plum (Used under Free DL Guidelines)
    </footer>
    <script src="script.js"></script>
</body>
</html>
